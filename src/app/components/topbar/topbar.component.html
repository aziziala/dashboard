<header id="page-topbar" role="banner">
  <div class="navbar-header">
    <!-- Mobile Menu Toggle -->
    <div class="d-flex align-items-center">
      <button
        class="btn header-item d-xl-none"
        (click)="toggleMobileMenu($event)"
        aria-label="Toggle mobile menu"
        aria-expanded="false"
      >
        <i class="fa fa-bars" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Right Side Actions -->
    <div class="d-flex align-items-center gap-1">
      <!-- App Switch -->
      <div class="app-switch" role="group" aria-label="Application selector">
        <span class="label left" [class.active]="currentApp === 'SMSTaxi'">
          SMS
        </span>

        <label class="switch">
          <input
            type="checkbox"
            [checked]="currentApp === 'TaxiSelect'"
            (change)="toggleApp($event)"
            [attr.aria-label]="'Switch to ' + (currentApp === 'SMSTaxi' ? 'TaxiSelect' : 'SMSTaxi')"
          />
          <span class="slider"></span>
        </label>

        <span class="label right" [class.active]="currentApp === 'TaxiSelect'">
          SELECT
        </span>
      </div>

      <!-- Webmail -->
      <a
        href="https://webmail.smstaxi.tn"
        target="_blank"
        rel="noopener noreferrer"
        class="btn header-item"
        title="Webmail"
        aria-label="Open webmail in new tab"
      >
        <i class="bx bx-envelope" aria-hidden="true"></i>
      </a>

      <!-- Fullscreen -->
      <button
        class="btn header-item"
        (click)="fullscreen()"
        title="Toggle fullscreen"
        aria-label="Toggle fullscreen mode"
      >
        <i class="bx bx-fullscreen" aria-hidden="true"></i>
      </button>

      <!-- Language Dropdown -->
      <div class="dropdown">
        <button
          class="btn header-item d-flex align-items-center justify-content-center"
          type="button"
          id="langDropdown"
          data-bs-toggle="dropdown"
          aria-expanded="false"
          aria-label="Select language"
          aria-haspopup="true"
        >
          <img
            [src]="currentLangFlag"
            [alt]="'Current language: ' + currentLang"
            width="22"
            height="16"
          />
        </button>

        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="langDropdown">
          <li>
            <a
              class="dropdown-item d-flex align-items-center gap-2"
              href="#"
              (click)="switchLanguage('ar'); $event.preventDefault()"
              [class.active]="currentLang === 'ar'"
              role="menuitem"
            >
              <img src="assets/flags/ar.png" width="20" alt="Arabic flag" /> العربية
            </a>
          </li>
          <li>
            <a
              class="dropdown-item d-flex align-items-center gap-2"
              href="#"
              (click)="switchLanguage('fr'); $event.preventDefault()"
              [class.active]="currentLang === 'fr'"
              role="menuitem"
            >
              <img src="assets/flags/fr.png" width="20" alt="French flag" /> Français
            </a>
          </li>
          <li>
            <a
              class="dropdown-item d-flex align-items-center gap-2"
              href="#"
              (click)="switchLanguage('en'); $event.preventDefault()"
              [class.active]="currentLang === 'en'"
              role="menuitem"
            >
              <img src="assets/flags/eng.png" width="20" alt="English flag" /> English
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
